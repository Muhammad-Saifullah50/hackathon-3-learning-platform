# Kong CORS Plugin Configuration for LearnPyByAI
# Enables cross-origin requests from frontend applications

apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: cors-plugin
  namespace: kong
plugin: cors
config:
  # Allowed origins
  origins:
    - "http://localhost:3000"
    - "https://learnpybyai.com"

  # Allowed HTTP methods
  methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS

  # Allowed headers
  headers:
    - Content-Type
    - Authorization
    - X-User-Id
    - X-User-Email
    - X-User-Role
    - X-Session-Id

  # Exposed headers (visible to frontend)
  exposed_headers:
    - X-Auth-Token
    - X-RateLimit-Limit
    - X-RateLimit-Remaining
    - X-RateLimit-Reset

  # Allow credentials (cookies, authorization headers)
  credentials: true

  # Preflight cache duration (seconds)
  max_age: 3600

  # Preflight continue (pass OPTIONS to upstream)
  preflight_continue: false
