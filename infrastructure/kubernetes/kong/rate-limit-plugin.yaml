# Kong Rate Limiting Plugin Configuration for LearnPyByAI
# Enforces rate limits per authenticated consumer using Redis backend

apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: rate-limit-consumer
  namespace: kong
plugin: rate-limiting
config:
  # Rate limits
  minute: 10
  hour: 600

  # Policy: redis for accurate rate limiting across multiple Kong replicas
  policy: redis

  # Redis configuration
  redis_host: redis-master.default.svc.cluster.local
  redis_port: 6379
  redis_password: "${REDIS_PASSWORD:-changeme}"  # Override with environment variable in production
  redis_database: 0
  redis_timeout: 2000

  # Fault tolerance: continue if Redis is unavailable
  fault_tolerant: true

  # Hide client headers (don't expose rate limit info to clients)
  hide_client_headers: false

  # Limit by: consumer (authenticated user)
  limit_by: consumer
