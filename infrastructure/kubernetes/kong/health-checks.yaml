# Kong Health Check Configuration for LearnPyByAI
# Active and passive health checks for all service upstreams

apiVersion: configuration.konghq.com/v1
kind: KongIngress
metadata:
  name: service-health-checks
  namespace: kong
upstream:
  healthchecks:
    # Active health checks (Kong actively probes the service)
    active:
      healthy:
        interval: 5              # Check every 5 seconds
        successes: 3             # Mark healthy after 3 consecutive successes
        http_statuses: [200, 302]
      unhealthy:
        interval: 5              # Check every 5 seconds when unhealthy
        http_failures: 3         # Mark unhealthy after 3 consecutive failures
        tcp_failures: 3          # Mark unhealthy after 3 TCP connection failures
        timeouts: 3              # Mark unhealthy after 3 timeouts
      http_path: /health         # Health check endpoint
      type: http                 # HTTP health check
      timeout: 1                 # 1 second timeout
      concurrency: 10            # Max concurrent health checks

    # Passive health checks (Kong monitors actual traffic)
    passive:
      healthy:
        successes: 5             # Mark healthy after 5 successful requests
        http_statuses: [200, 201, 202, 203, 204, 205, 206, 207, 208, 226, 300, 301, 302, 303, 304, 305, 306, 307, 308]
      unhealthy:
        http_failures: 5         # Mark unhealthy after 5 failed requests
        tcp_failures: 5          # Mark unhealthy after 5 TCP failures
        timeouts: 7              # Mark unhealthy after 7 timeouts
        http_statuses: [429, 500, 503]
      type: http
