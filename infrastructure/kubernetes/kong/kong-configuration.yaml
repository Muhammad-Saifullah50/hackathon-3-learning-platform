# Kong Declarative Configuration for LearnPyByAI Platform
# Format: Kong 3.x Declarative Config (deck)
# Date: 2026-03-15

_format_version: "3.0"
_info:
  title: LearnPyByAI API Gateway Configuration
  version: 1.0.0
  description: Kong configuration for LearnPyByAI multi-agent tutoring platform

# ============================================================================
# CONSUMERS
# ============================================================================

consumers:
- username: learnpybyai-auth
  custom_id: learnpybyai-auth-system
  tags:
    - auth
    - system

# ============================================================================
# JWT CREDENTIALS
# ============================================================================

jwt_secrets:
- consumer: learnpybyai-auth
  key: learnpybyai-jwt-issuer
  algorithm: RS256
  rsa_public_key: |
    -----BEGIN PUBLIC KEY-----
    # This will be replaced with actual public key from auth-service
    # Stored in Kubernetes Secret: kong-jwt-public-key
    -----END PUBLIC KEY-----
  tags:
    - jwt
    - auth

# ============================================================================
# SERVICES & ROUTES
# ============================================================================

services:

# ----------------------------------------------------------------------------
# Auth Service (Public + Protected Routes)
# ----------------------------------------------------------------------------
- name: auth-service
  url: http://auth-service.default.svc.cluster.local:8000
  protocol: http
  connect_timeout: 60000
  write_timeout: 60000
  read_timeout: 60000
  retries: 3
  tags:
    - auth
    - public

  routes:
  # Public routes (no JWT required)
  - name: auth-login
    paths:
      - /api/auth/login
    methods:
      - POST
    strip_path: false
    preserve_host: false
    protocols:
      - http
      - https
    tags:
      - public
      - auth

  - name: auth-register
    paths:
      - /api/auth/register
    methods:
      - POST
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - public
      - auth

  - name: auth-refresh
    paths:
      - /api/auth/refresh
    methods:
      - POST
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - public
      - auth

  - name: auth-public-key
    paths:
      - /api/auth/public-key
    methods:
      - GET
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - public
      - auth

  # Protected routes (JWT required)
  - name: auth-logout
    paths:
      - /api/auth/logout
    methods:
      - POST
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - protected
      - auth
    plugins:
    - name: jwt
      config:
        key_claim_name: iss
        secret_is_base64: false
        run_on_preflight: false
        claims_to_verify:
          - exp
        header_names:
          - Authorization
    - name: request-transformer
      config:
        add:
          headers:
            - "X-User-Id:$(jwt.claims.sub)"
            - "X-User-Email:$(jwt.claims.email)"
            - "X-User-Role:$(jwt.claims.role)"
            - "X-Session-Id:$(jwt.claims.session_id)"

# ----------------------------------------------------------------------------
# User Service (Protected)
# ----------------------------------------------------------------------------
- name: user-service
  url: http://user-service.default.svc.cluster.local:8000
  protocol: http
  connect_timeout: 60000
  write_timeout: 60000
  read_timeout: 60000
  retries: 3
  tags:
    - user
    - protected

  routes:
  - name: user-routes
    paths:
      - /api/users
    strip_path: false
    protocols:
      - http
      - https
    tags:
      - protected
      - user

  plugins:
  - name: jwt
    config:
      key_claim_name: iss
      secret_is_base64: false
      run_on_preflight: false
      claims_to_verify:
        - exp
      header_names:
        - Authorization
  - name: request-transformer
    config:
      add:
        headers:
          - "X-User-Id:$(jwt.claims.sub)"
          - "X-User-Email:$(jwt.claims.email)"
          - "X-User-Role:$(jwt.claims.role)"
  - name: rate-limiting
    config:
      minute: 60
      hour: 1000
      policy: redis
      redis_host: redis-master.default.svc.cluster.local
      redis_port: 6379
      identifier: consumer
      fault_tolerant: true

