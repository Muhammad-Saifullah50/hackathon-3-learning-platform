# ============================================================================
# GLOBAL PLUGINS
# ============================================================================

plugins:
- name: cors
  config:
    allowed_origins:
      - http://localhost:3000
      - http://localhost:3001
      - https://learnpybyai.com
      - https://app.learnpybyai.com
    allowed_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allowed_headers:
      - Content-Type
      - Authorization
      - X-Requested-With
      - Accept
      - Origin
    exposed_headers:
      - X-RateLimit-Limit
      - X-RateLimit-Remaining
      - X-RateLimit-Reset
      - X-Kong-Upstream-Latency
      - X-Kong-Proxy-Latency
    credentials: true
    max_age: 3600
    preflight_continue: false
  tags:
    - global
    - cors

- name: request-id
  config:
    header_name: X-Request-ID
    echo_downstream: true
    generator: uuid
  tags:
    - global
    - tracing

- name: correlation-id
  config:
    header_name: X-Correlation-ID
    echo_downstream: true
    generator: uuid
  tags:
    - global
    - tracing

# ============================================================================
# UPSTREAMS (with health checks)
# ============================================================================

upstreams:
- name: auth-upstream
  algorithm: round-robin
  hash_on: none
  hash_fallback: none
  slots: 10000
  healthchecks:
    active:
      healthy:
        interval: 5
        successes: 3
      unhealthy:
        interval: 5
        http_failures: 3
        tcp_failures: 3
        timeouts: 3
      http_path: /health
      type: http
      timeout: 1
      concurrency: 10
    passive:
      healthy:
        successes: 5
      unhealthy:
        http_failures: 5
        tcp_failures: 5
        timeouts: 7
      type: http
  tags:
    - auth
    - upstream

  targets:
  - target: auth-service.default.svc.cluster.local:8000
    weight: 100

- name: user-upstream
  algorithm: round-robin
  hash_on: none
  hash_fallback: none
  slots: 10000
  healthchecks:
    active:
      healthy:
        interval: 5
        successes: 3
      unhealthy:
        interval: 5
        http_failures: 3
        tcp_failures: 3
        timeouts: 3
      http_path: /health
      type: http
      timeout: 1
      concurrency: 10
    passive:
      healthy:
        successes: 5
      unhealthy:
        http_failures: 5
        tcp_failures: 5
        timeouts: 7
      type: http
  tags:
    - user
    - upstream

  targets:
  - target: user-service.default.svc.cluster.local:8000
    weight: 100
