apiVersion: dapr.io/v1alpha1
kind: Resiliency
metadata:
  name: learnpybyai-resiliency
  namespace: default
spec:
  policies:
    # Timeout policies
    timeouts:
      general: 5s
      fast: 1s
      slow: 30s

    # Retry policies
    retries:
      general:
        policy: exponential
        maxRetries: 3
        maxInterval: 1s
        duration: 100ms

      pubsubRetry:
        policy: exponential
        maxRetries: 5
        maxInterval: 2s
        duration: 500ms

    # Circuit breaker policies
    circuitBreakers:
      general:
        maxRequests: 100
        interval: 30s
        timeout: 10s
        trip: consecutiveFailures >= 5

      pubsubCB:
        maxRequests: 50
        interval: 60s
        timeout: 30s
        trip: consecutiveFailures >= 10

  # Apply policies to targets
  targets:
    # Service invocation targets
    apps:
      concepts-agent:
        timeout: general
        retry: general
        circuitBreaker: general

      code-review-agent:
        timeout: general
        retry: general
        circuitBreaker: general

      debug-agent:
        timeout: general
        retry: general
        circuitBreaker: general

      exercise-agent:
        timeout: general
        retry: general
        circuitBreaker: general

      progress-agent:
        timeout: general
        retry: general
        circuitBreaker: general

      llm-service:
        timeout: slow
        retry: general
        circuitBreaker: general

      user-service:
        timeout: fast
        retry: general
        circuitBreaker: general

      teacher-service:
        timeout: general
        retry: general
        circuitBreaker: general

    # Component targets (pub/sub, state store)
    components:
      learnpybyai-pubsub:
        outbound:
          timeout: general
          retry: pubsubRetry
          circuitBreaker: pubsubCB

      learnpybyai-statestore:
        outbound:
          timeout: fast
          retry: general
          circuitBreaker: general
