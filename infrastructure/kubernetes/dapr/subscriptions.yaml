# Dapr Subscriptions Configuration for LearnPyByAI Platform
# Date: 2026-03-15

# ============================================================================
# STRUGGLE ALERTS SUBSCRIPTION
# ============================================================================

apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: struggle-alerts-subscription
  namespace: default
spec:
  pubsubname: learnpybyai-pubsub
  topic: struggle-alerts
  routes:
    default: /webhooks/struggle-alert
  deadLetterTopic: struggle-alerts-deadletter
  bulkSubscribe:
    enabled: false

---

